services:
  - type: web
    name: jamaat-tracker-api
    runtime: node
    region: frankfurt
    rootDir: server
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: jamaat-db
          property: connectionString
      - key: NODE_ENV
        value: production

databases:
  - name: jamaat-db
    plan: free
    databaseName: jamaat_tracker
